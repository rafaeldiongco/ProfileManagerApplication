# Must already exist as a bucket in Supabase Storage, and be set
# to Public (Storage -> your bucket -> ... -> Make public) so the
# returned URLs are directly viewable without a signed-URL step.
supabase.bucket=avatars


# CRITICAL: Disable Hibernate's transaction management
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.connection.autocommit=false


# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# IMPORTANT: Tell Hibernate not to call commit/rollback
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Server
server.port=${PORT:8080}
spring.thymeleaf.cache=false
